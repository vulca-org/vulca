<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Text Destruction Minimal Rebuild</title>
  <style>
    :root {
      color-scheme: dark;
      background: #070a10;
      color: #eef6ff;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(120, 170, 210, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 170, 210, 0.08) 1px, transparent 1px),
        #070a10;
      background-size: 60px 60px;
    }

    svg {
      width: min(100vw, 960px);
      aspect-ratio: 16 / 9;
      display: block;
      overflow: visible;
    }

    .panel {
      fill: #0d141d;
      stroke: #678baf;
      stroke-width: 1;
    }

    .label {
      fill: #ebf4fc;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .note {
      fill: #cbdce8;
      font-size: 14px;
      letter-spacing: 0;
    }

    .field {
      fill: none;
      stroke: #4fe3ff;
      stroke-width: 1;
      opacity: 0.44;
    }

    .word-face {
      fill: #e8f6ff;
      font-size: 134px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .word-shadow-cyan {
      fill: #2ee2f4;
      opacity: 0.32;
      font-size: 134px;
      font-weight: 800;
    }

    .word-shadow-magenta {
      fill: #ff4eb5;
      opacity: 0.25;
      font-size: 134px;
      font-weight: 800;
    }

    .fragment {
      rx: 2;
      animation: drift 3.2s ease-in-out infinite alternate;
    }

    .particle {
      animation: drift 2.6s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from {
        transform: translate(var(--dx), var(--dy));
        opacity: 0.7;
      }
      to {
        transform: translate(0, 0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 960 540" role="img" aria-label="Local generated interactive text destruction rebuild">
    <rect class="panel" x="34" y="32" width="506" height="104" />
    <text class="label" x="50" y="66">Interactive Text Destruction minimal rebuild</text>
    <text class="note" x="50" y="103">3D text volume + pointer field + spring-back fragments</text>

    <circle class="field" cx="557" cy="270" r="78" />
    <circle class="field" cx="557" cy="270" r="138" />
    <circle class="field" cx="557" cy="270" r="216" />

    <g data-word="VULCA" transform="translate(184 330)">

    <rect class="panel" x="640" y="414" width="290" height="96" />
    <text class="note" x="658" y="441">local generated evidence</text>
    <text class="note" x="658" y="475">not copied from Codrops demo</text>
  </svg>
</body>
</html>
