      margin:0; min-height:100vh; display:grid; place-items:center;

        radial-gradient(circle at 72% 45%, rgba(255,91,145,.18), transparent 30%),
        radial-gradient(circle at 58% 36%, rgba(255,205,95,.14), transparent 24%),
        linear-gradient(rgba(120,95,150,.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,95,150,.12) 1px, transparent 1px),
        #08070d;
      background-size:auto, auto, 64px 64px, 64px 64px;
    }
    svg { width:min(100vw,960px); aspect-ratio:16/9; display:block; overflow:visible; }
    .panel { fill:#12121b; stroke:#8e789e; stroke-width:1; }
    .label { fill:#fff7ec; font-size:19px; font-weight:700; letter-spacing:0; }

    .msdf-shadow-a { fill:#ff5b91; opacity:.32; font-size:132px; font-weight:800; }
    .msdf-shadow-b { fill:#ffce63; opacity:.28; font-size:132px; font-weight:800; }
    .msdf-face { fill:#fff7ec; font-size:132px; font-weight:800; letter-spacing:0; }
    .dissolve-band { fill:none; stroke:#ffce63; stroke-width:2; opacity:.86; animation: dissolve 3.4s ease-in-out infinite alternate; }
    .glyph-fragment { rx:2; animation: dissolve 3.4s ease-in-out infinite alternate; }
    .dust-particle { animation: dissolve 2.6s ease-in-out infinite alternate; }
    .petal { animation: dissolve 3.9s ease-in-out infinite alternate; transform-origin:center; }
    .bloom { fill:none; stroke:#ff5b91; stroke-width:2; opacity:.42; }
    @keyframes dissolve {
      from { transform:translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity:.58; }
      to { transform:translate(0,0) rotate(0deg); opacity:1; }
    }
