<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phantom Land Grid Minimal Rebuild</title>
  <style>
    :root { color-scheme: dark; background:#070a10; color:#eef6ff; font-family:Arial,sans-serif; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      background:
        linear-gradient(rgba(132,184,222,.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(132,184,222,.18) 1px, transparent 1px),
        #070a10;
      background-size:60px 60px;
    }
    svg { width:min(100vw,960px); aspect-ratio:16/9; display:block; overflow:visible; }
    .panel { fill:#0d141d; stroke:#82a9ca; stroke-width:1; }
    .label { fill:#ebf4fc; font-size:19px; font-weight:700; letter-spacing:0; }
    .note { fill:#edf8ff; font-size:16px; letter-spacing:0; }
    .grid-line { stroke:#5fd2f0; stroke-width:1.15; opacity:.76; vector-effect:non-scaling-stroke; }
    .grid-node { fill:#45d8ff; opacity:.82; animation: pulse 2.6s ease-in-out infinite alternate; }
    .field-ring { fill:none; stroke:#ffd94f; stroke-width:1.4; opacity:.82; animation: orbit 4s ease-in-out infinite alternate; }
    .cursor { fill:#fff; stroke:#45d8ff; stroke-width:2; animation: orbit 4s ease-in-out infinite alternate; }
    .face-particle { animation: orbit 3.4s ease-in-out infinite alternate; }
    .cyan { fill:#55e6ff; } .yellow { fill:#ffd94f; } .magenta { fill:#ff5cac; } .white { fill:#e4f2ff; }
    @keyframes orbit { from { transform:translate(-18px,12px); } to { transform:translate(18px,-12px); } }
    @keyframes pulse { from { opacity:.46; } to { opacity:.94; } }
  </style>
</head>
