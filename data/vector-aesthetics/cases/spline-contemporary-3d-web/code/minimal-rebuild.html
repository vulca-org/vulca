<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spline Contemporary 3D Web Minimal Rebuild</title>
  <style>
    :root { color-scheme: dark; background:#07090f; color:#f4fbff; font-family:Arial,sans-serif; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      background:
        radial-gradient(circle at 64% 36%, rgba(112,204,255,.18), transparent 30%),
        radial-gradient(circle at 36% 60%, rgba(255,180,90,.12), transparent 28%),
        linear-gradient(rgba(104,128,160,.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(104,128,160,.13) 1px, transparent 1px),
        #07090f;
      background-size:auto, auto, 60px 60px, 60px 60px;
    }
    svg { width:min(100vw,960px); aspect-ratio:16/9; display:block; overflow:visible; }
    .panel-frame { fill:#0f1620; stroke:#7da8c7; stroke-width:1; }
    .label { fill:#f4fbff; font-size:19px; font-weight:700; letter-spacing:0; }
    .note { fill:#dbefff; font-size:16px; letter-spacing:0; }
    .ui-panel { fill:#172334; stroke:#89c8ff; stroke-width:1.5; animation: morph 4s ease-in-out infinite alternate; }
    .ui-panel.alt { fill:#201b2d; stroke:#ffbe74; }
    .spatial-node { fill:#f6fbff; stroke:#89c8ff; stroke-width:2; animation: morph 3.2s ease-in-out infinite alternate; }
    .state-track { fill:none; stroke:#7ef0d2; stroke-width:3; stroke-linecap:round; opacity:.82; animation: morph 4.4s ease-in-out infinite alternate; }
    .hotspot { fill:#ffbe74; stroke:#f6fbff; stroke-width:2; animation: morph 2.8s ease-in-out infinite alternate; }
    .depth-line { stroke:#536d86; stroke-width:1; opacity:.58; vector-effect:non-scaling-stroke; }
    .glow { fill:#89c8ff; opacity:.18; }
    @keyframes morph {
      from { transform:translate(-8px, 7px); opacity:.7; }
      to { transform:translate(10px, -6px); opacity:1; }
    }
  </style>
</head>
<body>
  <!-- Offline SVG/CSS approximation for learning review; it does not embed Spline runtime, scenes, models, materials, or screenshots. -->
  <svg viewBox="0 0 960 540" role="img" aria-label="Local generated Spline-style spatial UI sculpture rebuild" data-spline-ui="generated">

</html>
