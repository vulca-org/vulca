  <style>
    :root { color-scheme: dark; background:#06090d; color:#f1fbff; font-family:Arial,sans-serif; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      background:
        radial-gradient(circle at 66% 42%, rgba(72,224,255,.14), transparent 30%),
        radial-gradient(circle at 38% 58%, rgba(255,221,99,.10), transparent 28%),
        linear-gradient(rgba(94,150,168,.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(94,150,168,.16) 1px, transparent 1px),
        #06090d;
      background-size:auto, auto, 58px 58px, 58px 58px;
    }
    svg { width:min(100vw,960px); aspect-ratio:16/9; display:block; overflow:visible; }
    .panel { fill:#0c1218; stroke:#6ea3ba; stroke-width:1; }
    .label { fill:#f1fbff; font-size:19px; font-weight:700; letter-spacing:0; }
    .note { fill:#dff5ff; font-size:16px; letter-spacing:0; }
    .mesh-route { fill:none; stroke-linecap:round; stroke-linejoin:round; stroke-width:4; animation: sweep 3.6s ease-in-out infinite alternate; }
    .wire-cross { stroke:#78aebb; stroke-width:1; opacity:.58; vector-effect:non-scaling-stroke; }
    .shader-ribbon { fill:none; stroke-linecap:round; stroke-width:9; opacity:.68; animation: sweep 4.2s ease-in-out infinite alternate; }
    .node { fill:#f1fbff; opacity:.9; animation: sweep 2.8s ease-in-out infinite alternate; }
    .cyan { stroke:#4ee4ff; } .gold { stroke:#ffdf63; } .pink { stroke:#ff6db2; } .mint { stroke:#73f0bf; }
    @keyframes sweep {
      from { transform:translate(-10px, 8px); opacity:.58; }
      to { transform:translate(12px, -8px); opacity:1; }
    }
  </style>
</head>
