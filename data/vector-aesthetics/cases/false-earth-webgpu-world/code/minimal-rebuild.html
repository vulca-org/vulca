    :root { color-scheme: dark; background:#05070d; color:#effbff; font-family:Arial,sans-serif; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      background:
        radial-gradient(circle at 50% 92%, rgba(81,224,152,.18), transparent 34%),
        radial-gradient(circle at 38% 26%, rgba(102,184,255,.14), transparent 26%),
        linear-gradient(rgba(85,132,160,.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(85,132,160,.12) 1px, transparent 1px),
        #05070d;
      background-size:auto, auto, 62px 62px, 62px 62px;
    }
    svg { width:min(100vw,960px); aspect-ratio:16/9; display:block; overflow:visible; }
    .panel { fill:#0d141d; stroke:#6d9fb9; stroke-width:1; }
    .label { fill:#effbff; font-size:19px; font-weight:700; letter-spacing:0; }
    .note { fill:#dff7ea; font-size:16px; letter-spacing:0; }
    .horizon { fill:none; stroke:#7de9bd; stroke-width:2; opacity:.78; }
    .field-grid { stroke:#4a756d; stroke-width:1; opacity:.58; vector-effect:non-scaling-stroke; }
    .grass-blade { fill:none; stroke:#7df0b8; stroke-width:2; stroke-linecap:round; animation: drift 3.2s ease-in-out infinite alternate; }
    .cosmic-beam { fill:url(#beamGradient); opacity:.64; animation: drift 4.6s ease-in-out infinite alternate; }
    .wave-ring { fill:none; stroke:#7ec8ff; stroke-width:2; opacity:.72; animation: drift 3.8s ease-in-out infinite alternate; }
    .flower-bloom { animation: drift 3.4s ease-in-out infinite alternate; }
    .shader-layer { fill:#1b3650; opacity:.35; }
    .sun-core { fill:#f7ffb0; opacity:.94; }
    @keyframes drift {
      from { transform:translate(-7px, 6px); opacity:.62; }
      to { transform:translate(8px, -5px); opacity:1; }
    }
  </style>
</head>
