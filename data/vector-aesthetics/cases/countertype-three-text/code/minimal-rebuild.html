<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Countertype three-text minimal rebuild</title>
  <style>
    :root {
      color-scheme: dark;
      --paper: #f8f1de;
      --ink: #101418;
      --aqua: #53d0c8;
      --mint: #a4e47a;
      --coral: #ff7468;
      --violet: #8b78ff;
      --gold: #ffd166;
      --grid: rgba(248, 241, 222, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101418;
      color: var(--paper);
      font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(100vw, 1120px);
      aspect-ratio: 16 / 9;
      display: block;
      background: #101418;
    }

    .panel {
      fill: rgba(248, 241, 222, 0.045);
      stroke: rgba(248, 241, 222, 0.18);
      stroke-width: 1.1;
    }

    .title {
      fill: var(--paper);
      font-size: 28px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .label {
      fill: rgba(248, 241, 222, 0.76);
      font-size: 14px;
      letter-spacing: 0;
    }

    .micro {
      fill: rgba(248, 241, 222, 0.58);
      font-size: 11px;
      letter-spacing: 0;
    }

    .layout-line {
      stroke: rgba(248, 241, 222, 0.3);
      stroke-width: 1.2;
      stroke-dasharray: 5 7;
    }

    .text-block {
      fill: rgba(20, 24, 28, 0.72);
      stroke: rgba(83, 208, 200, 0.34);
      stroke-width: 1.1;
    }

    .glyph-mesh {
      fill: rgba(83, 208, 200, 0.74);
      stroke: rgba(248, 241, 222, 0.82);
      stroke-width: 0.9;
      animation: retessellate 4s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .glyph-mesh.depth {
      fill: rgba(139, 120, 255, 0.5);
      stroke: rgba(139, 120, 255, 0.82);
      animation-delay: -1.2s;
    }

    .glyph-mesh.accent {
      fill: rgba(255, 116, 104, 0.72);
      stroke: rgba(255, 209, 102, 0.82);
      animation-delay: -2.1s;
    }

    .mesh-edge {
      stroke: rgba(248, 241, 222, 0.25);
      stroke-width: 1;
    }

    .cache-cell {
      fill: rgba(164, 228, 122, 0.13);
      stroke: rgba(164, 228, 122, 0.52);
      stroke-width: 1;
    }

    .cache-cell.hot {
      fill: rgba(164, 228, 122, 0.42);
    }

    .axis-rail {
      stroke: rgba(255, 209, 102, 0.42);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .axis-handle {
      fill: var(--gold);
      stroke: #101418;
      stroke-width: 2;
    }

    .axis-handle.alt {
      fill: var(--coral);
    }

    .flow {
      fill: none;
      stroke: rgba(83, 208, 200, 0.46);
      stroke-width: 2;
      stroke-dasharray: 8 10;
      animation: route 5s linear infinite;
    }

    .evidence {
      fill: rgba(248, 241, 222, 0.06);
      stroke: rgba(255, 209, 102, 0.35);
      stroke-width: 1;
    }

    @keyframes retessellate {
      0%, 100% { transform: translateY(0) skewX(-4deg) scaleY(1); opacity: 0.72; }
      50% { transform: translateY(-5px) skewX(3deg) scaleY(1.08); opacity: 0.96; }
    }

    @keyframes route {
      to { stroke-dashoffset: -120; }
    }
  </style>
</head>
