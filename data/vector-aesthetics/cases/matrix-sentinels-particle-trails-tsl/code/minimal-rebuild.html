  <style>
    :root { color-scheme: dark; background:#04070b; color:#ecfff8; font-family:Arial,sans-serif; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      background:
        radial-gradient(circle at 52% 48%, rgba(76,255,190,.15), transparent 30%),
        radial-gradient(circle at 74% 34%, rgba(77,196,255,.12), transparent 24%),
        linear-gradient(rgba(72,132,118,.14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(72,132,118,.14) 1px, transparent 1px),
        #04070b;
      background-size:auto, auto, 56px 56px, 56px 56px;
    }
    svg { width:min(100vw,960px); aspect-ratio:16/9; display:block; overflow:visible; }
    .panel { fill:#0b1318; stroke:#64a88f; stroke-width:1; }
    .label { fill:#ecfff8; font-size:19px; font-weight:700; letter-spacing:0; }
    .note { fill:#d9f7eb; font-size:16px; letter-spacing:0; }
    .tunnel-grid { fill:none; stroke:#3d6d65; stroke-width:1; opacity:.58; }
    .trail-route { fill:none; stroke-linecap:round; stroke-linejoin:round; stroke-width:5; opacity:.86; animation: trace 3.4s ease-in-out infinite alternate; }
    .history-slice { fill:#4cffbe; opacity:.54; animation: trace 3s ease-in-out infinite alternate; }
    .sentinel-head { fill:#f8ffb8; stroke:#4cffbe; stroke-width:2; animation: trace 2.8s ease-in-out infinite alternate; }
    .flow-vector { stroke:#79cfff; stroke-width:1.5; stroke-linecap:round; opacity:.72; }
    .cyan { stroke:#79cfff; } .mint { stroke:#4cffbe; } .gold { stroke:#f8ffb8; } .pink { stroke:#ff6fb6; }
    @keyframes trace {
      from { transform:translate(-14px, 8px); opacity:.56; }
      to { transform:translate(12px, -7px); opacity:1; }
    }
  </style>
</head>
