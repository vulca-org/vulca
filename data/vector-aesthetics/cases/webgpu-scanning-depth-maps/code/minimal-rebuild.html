<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebGPU Depth Scan Minimal Rebuild</title>
  <style>
    :root {
      color-scheme: dark;
      background: #070a10;
      color: #eef6ff;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(120, 170, 210, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 170, 210, 0.08) 1px, transparent 1px),
        #070a10;
      background-size: 60px 60px;
    }

    svg {
      width: min(100vw, 960px);
      aspect-ratio: 16 / 9;
      display: block;
      overflow: visible;
    }

    .panel {
      fill: #0d141d;
      stroke: #678baf;
      stroke-width: 1;
    }

    .label {
      fill: #ebf4fc;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .note {
      fill: #cbdce8;
      font-size: 14px;
      letter-spacing: 0;
    }

    .scan-box {
      fill: rgba(18, 42, 61, 0.18);
      stroke: #476b88;
      stroke-width: 1;
    }

    .scan-band {
      fill: rgba(77, 230, 255, 0.20);
      animation: scan 3.8s ease-in-out infinite alternate;
    }

    .scan-line {
      stroke: #5eeeff;
      stroke-width: 3;
      animation: scan 3.8s ease-in-out infinite alternate;
    }

    .depth-dot {
      opacity: 0.88;
    }

    .near {
      fill: #ffd94f;
    }

    .mid {
      fill: #45d8ff;
    }

    .far {
      fill: #6989a6;
      opacity: 0.68;
    }

    @keyframes scan {
      from {
        transform: translateX(-350px);
      }
      to {
        transform: translateX(310px);
      }
    }
  </style>
</head>
<body>
  <!-- Offline SVG/CSS approximation for learning review; it does not run WebGPU or copy Codrops assets. -->

    <circle class="near" cx="812" cy="180" r="8" /><text class="note" x="830" y="184">near</text>

    <circle class="far" cx="812" cy="236" r="8" /><text class="note" x="830" y="240">far</text>

    <text class="note" x="110" y="466">scan_progress: animated</text>

    <rect class="panel" x="646" y="414" width="284" height="96" />
    <text class="note" x="664" y="442">local generated evidence</text>
