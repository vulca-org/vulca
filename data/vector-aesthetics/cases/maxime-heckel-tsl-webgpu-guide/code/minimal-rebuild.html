<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TSL and WebGPU field guide minimal rebuild</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111315;
      --paper: #f4f0df;
      --cyan: #4bd8d0;
      --lime: #a4e46f;
      --pink: #ff6f91;
      --amber: #ffd166;
      --blue: #7aa2ff;
      --panel: rgba(244, 240, 223, 0.055);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--paper);
      font: 14px/1.35 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(100vw, 1120px);
      aspect-ratio: 16 / 9;
      display: block;
      background: var(--bg);
    }

    .panel {
      fill: var(--panel);
      stroke: rgba(244, 240, 223, 0.18);
      stroke-width: 1;
    }

    .title {
      fill: var(--paper);
      font-size: 28px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .label {
      fill: rgba(244, 240, 223, 0.76);
      font-size: 14px;
      letter-spacing: 0;
    }

    .micro {
      fill: rgba(244, 240, 223, 0.58);
      font-size: 11px;
      letter-spacing: 0;
    }

    .shader-node {
      fill: rgba(75, 216, 208, 0.72);
      stroke: rgba(244, 240, 223, 0.85);
      stroke-width: 1.1;
      animation: compile 4.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .shader-node.math {
      fill: rgba(122, 162, 255, 0.66);
      animation-delay: -1s;
    }

    .shader-node.output {
      fill: rgba(255, 111, 145, 0.72);
      animation-delay: -2.2s;
    }

    .node-link {
      fill: none;
      stroke: rgba(75, 216, 208, 0.42);
      stroke-width: 2;
      stroke-dasharray: 7 9;
      animation: route 5s linear infinite;
    }

    .compute-lane {
      fill: rgba(164, 228, 111, 0.11);
      stroke: rgba(164, 228, 111, 0.46);
      stroke-width: 1;
    }

    .material-pass {
      fill: rgba(255, 209, 102, 0.12);
      stroke: rgba(255, 209, 102, 0.54);
      stroke-width: 1.1;
    }

    .uniform-chip {
      fill: rgba(255, 111, 145, 0.16);
      stroke: rgba(255, 111, 145, 0.64);
      stroke-width: 1;
    }

    .compile-band {
      fill: rgba(75, 216, 208, 0.13);
      animation: compile 4.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .evidence {
      fill: rgba(244, 240, 223, 0.06);
      stroke: rgba(255, 209, 102, 0.36);
      stroke-width: 1;
    }

    @keyframes compile {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.74; }
      50% { transform: translateY(-4px) scale(1.05); opacity: 0.98; }
    }

    @keyframes route {
      to { stroke-dashoffset: -120; }
    }
  </style>
</head>
