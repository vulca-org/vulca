<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Makio MeshLine Minimal Rebuild</title>
  <style>
    :root {
      color-scheme: dark;
      background: #080c11;
      color: #e8f2ff;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(120, 170, 210, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 170, 210, 0.08) 1px, transparent 1px),
        #080c11;
      background-size: 60px 60px;
    }

    svg {
      width: min(100vw, 960px);
      aspect-ratio: 16 / 9;
      display: block;
      overflow: visible;
    }

    .panel {
      fill: #0d141d;
      stroke: #54708d;
      stroke-width: 1;
    }

    .label {
      fill: #dbe8f4;
      font-size: 19px;
      letter-spacing: 0;
    }

    .note {
      fill: #cbdce8;
      font-size: 14px;
      letter-spacing: 0;
    }

    .glow {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 18;
      filter: url(#blurGlow);
      opacity: 0.76;
    }

    .route {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 10;
    }

    .packet {
      fill: none;
      stroke: #ffffff;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 4;
      stroke-dasharray: 38 96;
      animation: travel 2.8s linear infinite;
    }

    .packet.slow {
      animation-duration: 3.8s;
    }

    .packet.fast {
      animation-duration: 2.2s;
    }

    @keyframes travel {
      to {
        stroke-dashoffset: -268;
      }
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 960 540" role="img" aria-label="Local generated meshline rebuild">
    <defs>
      <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="9" />
      </filter>
    </defs>

    <rect class="panel" x="34" y="32" width="454" height="102" />
    <text class="label" x="50" y="55">Makio MeshLine minimal rebuild</text>
    <text class="note" x="50" y="91">thick routed vector lines + moving dash packets</text>

    <rect class="panel" x="626" y="414" width="304" height="96" />
    <text class="note" x="645" y="442">local generated evidence</text>
    <text class="note" x="645" y="474">not copied from source demo</text>

    <path class="glow" stroke="#22e6ff" d="M60 394 C145 235 252 304 369 333 C492 365 580 304 674 228" />
    <path class="glow" stroke="#ff4eb5" d="M130 338 C228 192 392 246 526 276 C673 308 757 255 869 159" />
    <path class="glow" stroke="#ffd847" d="M91 462 C246 389 333 292 467 265 C602 237 740 269 898 374" />

    <path class="route" stroke="#31dff2" d="M60 394 C145 235 252 304 369 333 C492 365 580 304 674 228" />
    <path class="route" stroke="#f34fa9" d="M130 338 C228 192 392 246 526 276 C673 308 757 255 869 159" />
    <path class="route" stroke="#ffd445" d="M91 462 C246 389 333 292 467 265 C602 237 740 269 898 374" />

    <path class="packet fast" d="M60 394 C145 235 252 304 369 333 C492 365 580 304 674 228" />
    <path class="packet" d="M130 338 C228 192 392 246 526 276 C673 308 757 255 869 159" />
    <path class="packet slow" d="M91 462 C246 389 333 292 467 265 C602 237 740 269 898 374" />
  </svg>
</body>
</html>
