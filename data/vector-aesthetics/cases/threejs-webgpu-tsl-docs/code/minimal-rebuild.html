<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Three.js WebGPU and TSL docs minimal rebuild</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121416;
      --paper: #f5f0df;
      --cyan: #53d0c8;
      --green: #9be36e;
      --orange: #ff9f5a;
      --red: #ff6874;
      --blue: #7ca7ff;
      --panel: rgba(245, 240, 223, 0.055);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--paper);
      font: 14px/1.35 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(100vw, 1120px);
      aspect-ratio: 16 / 9;
      display: block;
      background: var(--bg);
    }

    .panel {
      fill: var(--panel);
      stroke: rgba(245, 240, 223, 0.17);
      stroke-width: 1;
    }

    .title {
      fill: var(--paper);
      font-size: 28px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .label {
      fill: rgba(245, 240, 223, 0.76);
      font-size: 14px;
      letter-spacing: 0;
    }

    .micro {
      fill: rgba(245, 240, 223, 0.58);
      font-size: 11px;
      letter-spacing: 0;
    }

    .renderer-backend {
      fill: rgba(83, 208, 200, 0.14);
      stroke: rgba(83, 208, 200, 0.72);
      stroke-width: 1.3;
      animation: fallback 5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .renderer-backend.webgl {
      fill: rgba(255, 159, 90, 0.13);
      stroke: rgba(255, 159, 90, 0.72);
      animation-delay: -1.5s;
    }

    .renderer-backend.error {
      fill: rgba(255, 104, 116, 0.13);
      stroke: rgba(255, 104, 116, 0.72);
      animation-delay: -2.5s;
    }

    .node-material {
      fill: rgba(124, 167, 255, 0.19);
      stroke: rgba(124, 167, 255, 0.72);
      stroke-width: 1.1;
    }

    .buffer-block {
      fill: rgba(155, 227, 110, 0.13);
      stroke: rgba(155, 227, 110, 0.55);
      stroke-width: 1;
    }

    .fallback-route {
      fill: none;
      stroke: rgba(255, 159, 90, 0.72);
      stroke-width: 2.2;
      stroke-dasharray: 8 10;
      animation: fallback 5s ease-in-out infinite;
    }

    .doc-rule {
      fill: rgba(245, 240, 223, 0.05);
      stroke: rgba(245, 240, 223, 0.2);
      stroke-width: 1;
    }

    .evidence {
      fill: rgba(245, 240, 223, 0.06);
      stroke: rgba(255, 159, 90, 0.38);
      stroke-width: 1;
    }

    @keyframes fallback {
      0%, 100% { stroke-dashoffset: 0; transform: translateY(0); opacity: 0.78; }
      50% { stroke-dashoffset: -90; transform: translateY(-3px); opacity: 1; }
    }
  </style>
</head>
<body>
  <svg class="stage" viewBox="0 0 1120 630" role="img" aria-label="Generated Three.js WebGPU and TSL documentation rebuild showing renderer backends, TSL node materials, fallback routes, buffer blocks, and documentation rules." data-webgpu-tsl-docs="generated">
    <rect width="1120" height="630" fill="#121416"/>
    <path d="M74 514 L396 118 L1040 170 M174 468 L554 138 L1000 292 M280 520 L862 108" stroke="rgba(245,240,223,.13)" stroke-width="1"/>
    <rect class="panel" x="52" y="44" width="1016" height="536" rx="12"/>
    <text class="title" x="84" y="90">Three.js WebGPU and TSL docs minimal rebuild</text>
    <text class="label" x="86" y="119">Primitive: renderer backend contract + TSL node material + fallback routes + resource buffers</text>

    <g transform="translate(82 150)">
      <rect class="panel" x="0" y="0" width="404" height="292" rx="10"/>
      <text class="label" x="20" y="28">renderer backend decision</text>
      <rect class="renderer-backend" x="34" y="62" width="336" height="52" rx="12"/>
      <rect class="renderer-backend webgl" x="34" y="142" width="336" height="52" rx="12"/>
      <rect class="renderer-backend error" x="34" y="222" width="336" height="38" rx="12"/>
      <text class="label" x="56" y="94">WebGPU path</text>
      <text class="micro" x="202" y="94">preferred modern backend</text>

      <path class="fallback-route" d="M370 88 C434 100 442 146 370 168"/>

    <g transform="translate(526 150)">

      <rect class="node-material" x="34" y="60" width="132" height="54" rx="10"/>

      <rect class="node-material" x="34" y="142" width="132" height="54" rx="10"/>
      <rect class="node-material" x="184" y="142" width="132" height="54" rx="10"/>
      <rect class="node-material" x="334" y="142" width="132" height="54" rx="10"/>
      <text class="micro" x="58" y="91">position</text>
      <text class="micro" x="208" y="91">normal</text>
      <text class="micro" x="358" y="91">color</text>
      <text class="micro" x="58" y="173">roughness</text>
      <text class="micro" x="208" y="173">emissive</text>
      <text class="micro" x="358" y="173">output</text>
      <path d="M166 86 H184 M316 86 H334 M166 168 H184 M316 168 H334 M100 114 V142 M400 114 V142" stroke="rgba(245,240,223,.28)" stroke-width="2"/>
      <rect class="doc-rule" x="34" y="224" width="432" height="42" rx="9"/>
      <text class="micro" x="52" y="249">docs case teaches constraints, not a copied demo scene or source snippet</text>
    </g>

    <g transform="translate(82 478)">
      <rect class="panel" x="0" y="0" width="940" height="58" rx="10"/>
      <text class="label" x="18" y="24">resource and output buffers</text>
      <rect class="buffer-block" x="210" y="15" width="74" height="26" rx="6"/>
      <rect class="buffer-block" x="294" y="15" width="74" height="26" rx="6"/>
      <rect class="buffer-block" x="378" y="15" width="74" height="26" rx="6"/>
      <rect class="buffer-block" x="462" y="15" width="74" height="26" rx="6"/>
      <rect class="buffer-block" x="546" y="15" width="74" height="26" rx="6"/>
      <rect class="buffer-block" x="630" y="15" width="74" height="26" rx="6"/>
      <rect class="buffer-block" x="714" y="15" width="74" height="26" rx="6"/>
      <rect class="buffer-block" x="798" y="15" width="74" height="26" rx="6"/>
      <text class="micro" x="220" y="33">depth</text>
      <text class="micro" x="304" y="33">color</text>
      <text class="micro" x="388" y="33">normal</text>
      <text class="micro" x="472" y="33">mrt</text>
      <text class="micro" x="556" y="33">storage</text>
      <text class="micro" x="640" y="33">sample</text>
      <text class="micro" x="724" y="33">target</text>
      <text class="micro" x="808" y="33">resolve</text>
    </g>

    <g transform="translate(82 548)">
      <rect class="evidence" x="0" y="0" width="940" height="32" rx="8"/>
      <text class="micro" x="18" y="20">local generated learning evidence only: no imported Three.js docs screenshots, examples, code snippets, renderer files, or demos</text>
    </g>
  </svg>
</body>
</html>
