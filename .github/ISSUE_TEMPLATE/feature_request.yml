name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      placeholder: Why is this useful?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New Provider
        - New Agent
        - New Tradition
        - Canvas UI
        - Gallery
        - API
        - Other
