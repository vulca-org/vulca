# Prevent Supabase Free tier from pausing due to inactivity (7-day limit)
# Pings the backend /health/deep endpoint which queries the database

name: Keepalive Supabase

on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours — prevent cold start
  workflow_dispatch:

jobs:
  ping:
    name: Ping Database
    runs-on: ubuntu-latest
    steps:
      - name: Health check (triggers DB query)
        run: |
          response=$(curl -sf "${{ secrets.CLOUD_RUN_URL }}/health/deep" || curl -sf https://vulcaart.art/api/v1/health/deep || echo '{"components":{"database":"unknown"}}')
          echo "$response" | python3 -m json.tool
          db_status=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['components']['database'])")
          echo "Database status: $db_status"
          if [ "$db_status" != "connected" ]; then
            echo "::error::Database not connected: $db_status"
            exit 1
          fi
